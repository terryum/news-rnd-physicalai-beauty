name: Crawl Sources

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21시) — fast phase
    - cron: '0 21 * * *'
    # 매일 한국시간 오전 6시 30분 — slow phase (Playwright)
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      phase:
        description: 'Crawl phase to run'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast
          - slow
          - all

jobs:
  crawl-fast:
    if: github.event.schedule == '0 21 * * *' || github.event.inputs.phase == 'fast' || github.event.inputs.phase == 'all'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run fast crawl (Groups A-D)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: npx tsx scripts/crawl-fast.ts

      - name: Commit crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/items.json
          git diff --staged --quiet || git commit -m "data: fast crawl $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  crawl-slow:
    if: github.event.schedule == '30 21 * * *' || github.event.inputs.phase == 'slow' || github.event.inputs.phase == 'all'
    needs: [crawl-fast]
    # slow phase는 fast 완료 후 실행. schedule 트리거 시에는 별도 cron으로 30분 후 실행.
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # fast crawl이 push한 최신 데이터 기반

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Playwright 설치 (Group E 전용)
      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run slow crawl (Group E - Playwright)
        run: npx tsx scripts/crawl-slow.ts

      - name: Commit merged data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/items.json
          git diff --staged --quiet || git commit -m "data: slow crawl $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
